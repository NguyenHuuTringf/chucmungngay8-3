<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>8/3</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background: radial-gradient(circle at top, #d7ebff 0%, #79aee8 35%, #1d4f91 100%);
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(120deg, rgba(255, 255, 255, 0.18), transparent 35%, transparent 70%, rgba(255, 255, 255, 0.08));
      pointer-events: none;
    }

    .container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px 120px;
      position: relative;
      z-index: 2;
    }

    .wrapper {
      width: 100%;
      max-width: 1400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .header {
      text-align: center;
    }

    .header .sub {
      font-size: 12px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(239, 246, 255, 0.98);
      margin-bottom: 12px;
      font-weight: 700;
      text-shadow: 0 1px 2px rgba(15, 23, 42, 0.18);
    }

    .header h1 {
      font-size: 42px;
      margin-bottom: 12px;
      color: #ffffff;
      text-shadow: 0 2px 8px rgba(15, 23, 42, 0.22);
    }

    .header p {
      font-size: 16px;
      color: #f8fbff;
      font-weight: 600;
    }

    .book-scene {
      width: 980px;
      height: 620px;
      position: relative;
      perspective: 2600px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .book-shadow {
      position: absolute;
      left: 80px;
      right: 80px;
      bottom: 10px;
      height: 56px;
      border-radius: 999px;
      background: rgba(2, 6, 23, 0.3);
      filter: blur(24px);
    }

    .book-base {
      position: absolute;
      width: 920px;
      height: 560px;
      border-radius: 26px;
      background: linear-gradient(180deg, #0d315d, #123e74);
      box-shadow: 0 28px 70px rgba(7, 17, 41, 0.42);
    }

    .book-spine {
      position: absolute;
      left: 50%;
      top: 30px;
      transform: translateX(-50%);
      width: 30px;
      height: 500px;
      border-radius: 999px;
      background: linear-gradient(180deg, #143d73, #0b2647);
      box-shadow: inset 0 0 10px rgba(255,255,255,0.12);
      z-index: 1;
    }

    .book-spine::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      width: 8px;
      height: calc(100% - 28px);
      border-radius: 999px;
      background: rgba(219, 234, 254, 0.18);
    }

    .open-book {
      position: absolute;
      width: 900px;
      height: 540px;
      display: flex;
      align-items: stretch;
      justify-content: center;
      gap: 0;
      z-index: 2;
    }

    .left-panel,
    .right-panel {
      width: 450px;
      height: 540px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #ffffff 0%, #f3f8ff 100%);
      border: 1px solid #dbeafe;
      box-shadow: inset 0 0 20px rgba(15, 23, 42, 0.06);
    }

    .left-panel {
      border-radius: 20px 0 0 20px;
    }

    .right-panel {
      border-radius: 0 20px 20px 0;
    }

    .left-panel::before,
    .right-panel::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 28px;
      z-index: 1;
      pointer-events: none;
    }

    .left-panel::before {
      right: 0;
      background: linear-gradient(270deg, rgba(37,99,235,0.12), transparent);
    }

    .right-panel::before {
      left: 0;
      background: linear-gradient(90deg, rgba(37,99,235,0.12), transparent);
    }

    .static-left,
    .static-right,
    .sheet {
      position: absolute;
      inset: 0;
    }

    .sheet {
      transform-style: preserve-3d;
      transition: transform 1.25s cubic-bezier(.22,.8,.2,1);
      z-index: 5;
    }

    .sheet.turn {
      transform: rotateY(-180deg);
    }

    .sheet.right-sheet {
      transform-origin: left center;
    }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      overflow: hidden;
    }

    .backface {
      transform: rotateY(180deg);
    }

    .right-sheet .frontface,
    .right-sheet .backface {
      border-radius: 0 20px 20px 0;
    }

    .cover-left,
    .cover-right {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 55%, #163d88 100%);
      color: white;
    }

    .image-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.68;
    }

    .overlay-dark {
      position: absolute;
      inset: 0;
      background: linear-gradient(150deg, rgba(13,42,84,0.2), rgba(8,20,42,0.8));
    }

    .cover-content,
    .end-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      z-index: 2;
    }

    .badge {
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.38);
      background: rgba(255, 255, 255, 0.16);
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 4px;
      color: #ffffff;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .cover-content h2,
    .end-content h2 {
      font-size: 34px;
      line-height: 1.35;
      margin-bottom: 16px;
      color: #ffffff;
      text-shadow: 0 2px 10px rgba(15, 23, 42, 0.28);
    }

    .cover-content p,
    .end-content p {
      max-width: 290px;
      font-size: 16px;
      line-height: 1.8;
      color: #ffffff;
      text-shadow: 0 1px 6px rgba(15, 23, 42, 0.22);
      font-weight: 600;
    }

    .text-page,
    .image-page,
    .hint-page,
    .end-page {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #ffffff 0%, #f3f8ff 100%);
      color: #334155;
    }

    .text-page {
      padding: 38px 34px 38px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }

    .text-line {
      width: 80px;
      height: 4px;
      border-radius: 999px;
      background: #3b82f6;
      margin: 0 auto 20px;
    }

    .page-number {
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #1d4ed8;
      margin-bottom: 16px;
      font-weight: 700;
    }

    .text-page h3 {
      font-size: 32px;
      color: #102a6b;
      margin-bottom: 22px;
    }

    .text-page p {
      font-size: 20px;
      line-height: 1.9;
      color: #334155;
      font-weight: 600;
    }

    .image-page,
    .end-page {
      padding: 28px 28px 28px 26px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16px;
    }

    .image-frame {
      overflow: hidden;
      border-radius: 20px;
      border: 4px solid #bfdbfe;
      box-shadow: 0 10px 24px rgba(30, 41, 59, 0.18);
      background: #eff6ff;
      position: relative;
    }

    .image-page img,
    .end-page img {
      display: block;
      width: 100%;
      height: 380px;
      object-fit: cover;
    }

    .caption {
      text-align: center;
      font-size: 16px;
      font-style: italic;
      color: #334155;
      padding: 0 10px;
      font-weight: 600;
    }

    .hint-page {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 30px;
      background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
      color: #1e3a8a;
    }

    .hint-line {
      width: 64px;
      height: 4px;
      border-radius: 999px;
      background: #2563eb;
      margin: 0 auto 16px;
    }

    .hint-page h3 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #102a6b;
    }

    .hint-page p {
      font-size: 15px;
      line-height: 1.7;
      color: #1e3a8a;
      font-weight: 600;
    }

    .end-frame-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.1), rgba(15, 23, 42, 0.45));
      color: #ffffff;
      font-size: 44px;
      font-weight: 800;
      letter-spacing: 6px;
      text-shadow: 0 4px 12px rgba(0, 0, 0, 0.35);
    }

    .click-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50%;
      z-index: 40;
      background: transparent;
      cursor: pointer;
    }

    .click-zone.left {
      left: 0;
    }

    .click-zone.right {
      right: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.12);
      color: white;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: 0.25s;
      font-weight: 700;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    .counter {
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      backdrop-filter: blur(4px);
      font-weight: 700;
    }

    .note {
      max-width: 920px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.12);
      padding: 18px 20px;
      border-radius: 24px;
      line-height: 1.8;
      color: #ffffff;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.14);
      font-size: 15px;
      text-align: center;
      font-weight: 600;
    }

    .music-player {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 99;
      width: 320px;
      max-width: calc(100vw - 32px);
      opacity: 0.92;
    }

    @media (max-width: 1100px) {
      .book-scene {
        width: 760px;
        height: 520px;
      }

      .book-base {
        width: 720px;
        height: 470px;
      }

      .book-spine {
        height: 420px;
        top: 25px;
      }

      .open-book {
        width: 700px;
        height: 450px;
      }

      .left-panel,
      .right-panel {
        width: 350px;
        height: 450px;
      }

      .text-page p {
        font-size: 17px;
      }

      .image-page img,
      .end-page img {
        height: 300px;
      }

      .end-frame-label {
        font-size: 34px;
      }
    }

    @media (max-width: 820px) {
      .container {
        padding-top: 24px;
      }

      .header h1 {
        font-size: 28px;
      }

      .header p {
        font-size: 14px;
      }

      .book-scene {
        width: 360px;
        height: 560px;
      }

      .book-base {
        width: 340px;
        height: 520px;
      }

      .book-spine {
        width: 18px;
        height: 470px;
        top: 25px;
      }

      .open-book {
        width: 320px;
        height: 500px;
      }

      .left-panel,
      .right-panel {
        width: 160px;
        height: 500px;
      }

      .right-sheet .frontface,
      .right-sheet .backface {
        border-radius: 0 16px 16px 0;
      }

      .cover-content,
      .end-content,
      .text-page,
      .image-page,
      .hint-page,
      .end-page {
        padding: 16px 12px;
      }

      .cover-content h2,
      .text-page h3,
      .end-content h2 {
        font-size: 20px;
      }

      .cover-content p,
      .end-content p,
      .text-page p,
      .caption,
      .hint-page p {
        font-size: 12px;
        line-height: 1.7;
      }

      .image-page img,
      .end-page img {
        height: 210px;
      }

      .badge,
      .page-number {
        font-size: 10px;
        letter-spacing: 2px;
      }

      .hint-page h3 {
        font-size: 16px;
      }

      .note {
        font-size: 13px;
      }

      .end-frame-label {
        font-size: 22px;
        letter-spacing: 3px;
      }
    }
  </style>
</head>
<body>  
  <div class="container">
    <div class="wrapper">
      <div class="header">
        <div class="sub">Happy Women's Day</div>
        <h1>🎉Chúc mừng 8/3🎉</h1>
        <p>Nhấn bên phải để sang trang, bên trái để quay lại</p>
      </div>

      <div class="book-scene">
        <div class="book-shadow"></div>
        <div class="book-base"></div>
        <div class="book-spine"></div>

        <div class="open-book">
          <div class="left-panel">
            <div class="static-left" id="staticLeft"></div>
          </div>

          <div class="right-panel">
            <div class="static-right" id="staticRight"></div>

            <div class="sheet right-sheet" id="coverSheet" style="z-index: 20;">
              <div class="face frontface cover-right">
                <img class="image-bg" src="img0.jpeg" alt="Bìa sách" />
                <div class="overlay-dark"></div>
                <div class="cover-content">
                  <div class="badge">08 / 03</div>
                  <h2>Nhấn ở đây để coi nì 👆</h2>
                </div>
              </div>
              <div class="face backface hint-page">
                <div>
                  <div class="hint-line"></div>
                  <h3>Mở sách ra nhé</h3>
                  <p>Trang trái là lời chúc, trang phải là hình ảnh.</p>
                </div>
              </div>
            </div>

            <div class="sheet right-sheet" id="rightSheet1" style="z-index: 18;"></div>
            <div class="sheet right-sheet" id="rightSheet2" style="z-index: 16;"></div>
            <div class="sheet right-sheet" id="rightSheet3" style="z-index: 14;"></div>
          </div>

          <div class="click-zone left" id="leftZone" aria-label="Lật về bên trái"></div>
          <div class="click-zone right" id="rightZone" aria-label="Lật sang bên phải"></div>
        </div>
      </div>

      <div class="controls">
        <button class="btn" id="prevBtn">Quay lại</button>
        <div class="counter" id="counter">0 / 4</div>
      </div>

      <div class="note">
       
        <strong</strong> 
        <strong></strong> 
      </div>
    </div>
  </div>

  <script>
    const prevBtn = document.getElementById('prevBtn');
    const counter = document.getElementById('counter');
    const staticLeft = document.getElementById('staticLeft');
    const staticRight = document.getElementById('staticRight');
    const leftZone = document.getElementById('leftZone');
    const rightZone = document.getElementById('rightZone');

    const coverSheet = document.getElementById('coverSheet');
    const rightSheet1 = document.getElementById('rightSheet1');
    const rightSheet2 = document.getElementById('rightSheet2');
    const rightSheet3 = document.getElementById('rightSheet3');

    const spreads = [
      {
        left: {
          type: 'text',
          page: '1️⃣',
          title: 'Hi bạn, chúc mừng ngày 8/3',
          content: 'Chúc bạn luôn đẹp gái, rạng rỡ, dịu dàng, hạnh phúc.'
        },
        right: {
          type: 'image',
          image: 'img1.jpg',
          caption: 'Ảnh dìm nè'
        }
      },
      {
        left: {
          type: 'text',
          page: '2️⃣',
          title: 'Chúc bạn ôm nhiều hoa, chất đầy quà, ăn uống thả ga, được đi chơi xa, sớm ngày có tui',
          content: '😁😁😁😁'
        },
        right: {
          type: 'image',
          image: 'img2.jpg',
          caption: 'Lại là ảnh dìm'
        }
      },
      {
        left: {
          type: 'text',
          page: '3️⃣',
          title: 'Hết văn rồi :))))',
          content: 'Hy vọng bạn thích trò ni (mặc dù tui biết bạn nỏ thích cho lắm 😒)'
        },
        right: {
          type: 'image',
          image: 'img3.jpeg',
          caption: 'Thôi cho tấm ảnh tử tế'
        }
      }
    ];

    const finalSpread = {
      left: {
        image: 'img4.jpeg',
        caption: 'Ảnh ni cute'
      },
      right: {
        image: 'img5.jpg',
        caption: 'HiHi'
      }
    };

    function textPageHTML(data) {
      return `
        <div class="text-page">
          <div class="text-line"></div>
          <div class="page-number">${data.page}</div>
          <h3>${data.title}</h3>
          <p>${data.content}</p>
        </div>
      `;
    }

    function imagePageHTML(data) {
      return `
        <div class="image-page">
          <div class="image-frame">
            <img src="${data.image}" alt="${data.caption}">
          </div>
          <div class="caption">${data.caption}</div>
        </div>
      `;
    }

    function endPageHTML(data) {
      return `
        <div class="end-page">
          <div class="image-frame">
            <img src="${data.image}" alt="${data.caption}">
            <div class="end-frame-label">END</div>
          </div>
          <div class="caption">${data.caption}</div>
        </div>
      `;
    }

    function hintHTML(title, desc) {
      return `
        <div class="hint-page">
          <div>
            <div class="hint-line"></div>
            <h3>${title}</h3>
            <p>${desc}</p>
          </div>
        </div>
      `;
    }

    rightSheet1.innerHTML = `
      <div class="face frontface">${imagePageHTML(spreads[0].right)}</div>
      <div class="face backface">${imagePageHTML(spreads[1].right)}</div>
    `;

    rightSheet2.innerHTML = `
      <div class="face frontface">${imagePageHTML(spreads[1].right)}</div>
      <div class="face backface">${imagePageHTML(spreads[2].right)}</div>
    `;

    rightSheet3.innerHTML = `
      <div class="face frontface">${imagePageHTML(spreads[2].right)}</div>
      <div class="face backface">${endPageHTML(finalSpread.right)}</div>
    `;

    let step = 0;
    const totalSteps = 4;

    function renderStaticPages() {
      if (step === 0) {
        staticLeft.innerHTML = `
          <div class="face frontface cover-left">
            <div class="overlay-dark"></div>
            <div class="cover-content">
              <div class="badge">Happy 8/3</div>
              <h2>Nhìn sang bên phải đi bạn</h2>
            </div>
          </div>
        `;
        staticRight.innerHTML = '';
      } else if (step >= 1 && step <= 3) {
        staticLeft.innerHTML = textPageHTML(spreads[step - 1].left);
        staticRight.innerHTML = imagePageHTML(spreads[step - 1].right);
      } else {
        staticLeft.innerHTML = imagePageHTML(finalSpread.left);
        staticRight.innerHTML = endPageHTML(finalSpread.right);
      }
    }

    function updateBook() {
      coverSheet.classList.toggle('turn', step >= 1);
      rightSheet1.classList.toggle('turn', step >= 2);
      rightSheet2.classList.toggle('turn', step >= 3);
      rightSheet3.classList.toggle('turn', step >= 4);

      renderStaticPages();
      counter.textContent = `${step} / ${totalSteps}`;
    }

    function nextPage(event) {
      if (event) event.stopPropagation();
      if (step < totalSteps) {
        step++;
        updateBook();
      }
    }

    function prevPage(event) {
      if (event) event.stopPropagation();
      if (step > 0) {
        step--;
        updateBook();
      }
    }

    rightZone.addEventListener('click', nextPage);
    leftZone.addEventListener('click', prevPage);
    prevBtn.addEventListener('click', prevPage);

    updateBook();
  </script>
</body>
</html>
